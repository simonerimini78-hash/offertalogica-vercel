<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Staff lead | OffertaLogica</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #cbd5e1;
            --primary: #16a34a;
            --danger: #b91c1c;
            --danger-bg: #fee2e2;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); }
        .shell { max-width: 1180px; margin: 0 auto; padding: 24px; }
        header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin: 0 0 4px; }
        p { color: var(--muted); margin: 0; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
        .controls { display: grid; grid-template-columns: minmax(0, 1fr) 120px auto auto auto; gap: 10px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 5px; color: #334155; }
        input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px; font-size: 14px; }
        button, .button { border: 0; border-radius: 8px; padding: 11px 14px; font-weight: 900; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        button { background: var(--primary); color: #fff; }
        .button { background: #e2e8f0; color: var(--text); }
        button.danger { background: var(--danger); }
        button.subtle-danger { background: var(--danger-bg); color: var(--danger); padding: 7px 10px; font-size: 12px; }
        .status { margin-top: 10px; font-size: 14px; color: var(--muted); }
        .status.error { color: var(--danger); font-weight: 800; }
        .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
        .metric { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; }
        .metric strong { display: block; font-size: 24px; color: #14532d; line-height: 1; margin-bottom: 5px; }
        .metric span { color: var(--muted); font-size: 13px; }
        .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); }
        table { width: 100%; border-collapse: collapse; min-width: 1120px; }
        th, td { border-bottom: 1px solid #e2e8f0; padding: 10px; text-align: left; font-size: 13px; vertical-align: top; }
        th { background: #f8fafc; color: #334155; position: sticky; top: 0; }
        td { color: #334155; }
        .badge { display: inline-flex; border-radius: 999px; padding: 3px 8px; background: #e0f2fe; color: #075985; font-weight: 800; font-size: 12px; white-space: nowrap; }
        .badge.ok { background: #dcfce7; color: #166534; }
        .badge.warn { background: #fef3c7; color: #92400e; }
        .muted { color: var(--muted); }
        details { max-width: 420px; margin-top: 7px; }
        summary { cursor: pointer; color: #166534; font-weight: 800; }
        .pdf-details { margin-top: 8px; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; }
        .pdf-details dl { display: grid; grid-template-columns: minmax(120px, auto) 1fr; gap: 4px 10px; margin: 8px 0; }
        .pdf-details dt { color: var(--muted); }
        .pdf-details dd { margin: 0; overflow-wrap: anywhere; }
        .pdf-document { padding-top: 8px; margin-top: 8px; border-top: 1px solid #e2e8f0; }
        .missing { color: #9a3412; font-weight: 700; }
        .economic-note { max-width: 210px; }
        @media (max-width: 780px) {
            .shell { padding: 16px; }
            header, .controls { grid-template-columns: 1fr; display: grid; }
            .metrics { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header>
            <div>
                <h1>Staff lead</h1>
                <p>Vista protetta per controllare lead verificati, offerte scelte e monetizzazione.</p>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <a class="button" href="/staff-analytics.html">Analytics</a>
                <a class="button" href="/">Calcolatore</a>
            </div>
        </header>

        <section class="panel">
            <div class="controls">
                <div>
                    <label for="token">Token staff o health</label>
                    <input id="token" type="password" autocomplete="off" placeholder="Incolla token oppure usa #token=...">
                </div>
                <div>
                    <label for="limit">Righe</label>
                    <input id="limit" type="number" min="1" max="200" value="50">
                </div>
                <button type="button" onclick="loadLeads()">Aggiorna</button>
                <button id="csv-button" type="button" class="button">CSV</button>
                <button id="reset-button" type="button" class="danger">Azzera lead</button>
            </div>
            <div id="status" class="status">Inserisci il token e aggiorna.</div>
        </section>

        <section class="metrics" id="metrics" aria-live="polite"></section>

        <section class="table-wrap" style="margin-top:16px;">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Stato</th>
                        <th>Cliente</th>
                        <th>Contatti</th>
                        <th>Fonte</th>
                        <th>Dati letti</th>
                        <th>Risparmio</th>
                        <th>Offerta scelta</th>
                        <th>Consensi</th>
                        <th>Monetizzazione</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="rows">
                    <tr><td colspan="11" class="muted">Nessun dato caricato.</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        const tokenInput = document.getElementById("token");
        const limitInput = document.getElementById("limit");
        const statusBox = document.getElementById("status");
        const metricsBox = document.getElementById("metrics");
        const rowsBox = document.getElementById("rows");
        const csvButton = document.getElementById("csv-button");
        const resetButton = document.getElementById("reset-button");
        let currentLeads = [];

        function tokenFromHash() {
            const hash = new URLSearchParams(String(location.hash || "").replace(/^#/, ""));
            return hash.get("token") || hash.get("staff") || "";
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function euro(value) {
            const number = Number(value);
            return Number.isFinite(number) ? `${number.toFixed(2)} euro` : "";
        }

        function formatDate(value) {
            if (!value) return "";
            try {
                return new Intl.DateTimeFormat("it-IT", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "2-digit",
                    hour: "2-digit",
                    minute: "2-digit"
                }).format(new Date(value));
            } catch {
                return value;
            }
        }

        function setStatus(message, isError = false) {
            statusBox.textContent = message;
            statusBox.className = `status${isError ? " error" : ""}`;
        }

        function renderMetrics(summary = {}) {
            metricsBox.innerHTML = `
                <div class="metric"><strong>${summary.recentRows || 0}</strong><span>Contatti presenti</span></div>
                <div class="metric"><strong>${summary.verifiedRows || 0}</strong><span>Numeri verificati con OTP</span></div>
                <div class="metric"><strong>${summary.withSelectedOffer || 0}</strong><span>Con offerta scelta</span></div>
                <div class="metric"><strong>${euro(summary.confirmedRevenue || 0)}</strong><span>Entrate confermate, non semplici click</span></div>
            `;
        }

        function hasValue(value) {
            return value !== null && value !== undefined && value !== "";
        }

        const pdfLabels = [
            ["fornitore", "Fornitore"],
            ["commodity", "Fornitura"],
            ["consumo_luce_kwh", "Consumo luce annuo"],
            ["prezzo_luce_eur_kwh", "Prezzo luce"],
            ["quota_fissa_vendita_luce_eur_anno", "Quota fissa luce annua"],
            ["consumo_gas_smc", "Consumo gas annuo"],
            ["prezzo_gas_eur_smc", "Prezzo gas"],
            ["quota_fissa_vendita_gas_eur_anno", "Quota fissa gas annua"],
            ["potenza_impegnata_kw", "Potenza impegnata"],
            ["pod", "POD"],
            ["pdr", "PDR"],
            ["textExtracted", "Caratteri letti dal PDF"],
        ];

        function pdfValue(key, value) {
            if (!hasValue(value)) return "";
            const units = {
                consumo_luce_kwh: " kWh/anno",
                prezzo_luce_eur_kwh: " euro/kWh",
                quota_fissa_vendita_luce_eur_anno: " euro/anno",
                consumo_gas_smc: " Smc/anno",
                prezzo_gas_eur_smc: " euro/Smc",
                quota_fissa_vendita_gas_eur_anno: " euro/anno",
                potenza_impegnata_kw: " kW",
            };
            return `${value}${units[key] || ""}`;
        }

        function renderPdfFields(data = {}) {
            const rows = pdfLabels
                .filter(([key]) => hasValue(data[key]))
                .map(([key, label]) => `<dt>${escapeHtml(label)}</dt><dd>${escapeHtml(pdfValue(key, data[key]))}</dd>`)
                .join("");
            return rows ? `<dl>${rows}</dl>` : `<span class="muted">Nessun campo tecnico estratto.</span>`;
        }

        function missingPdfFields(data = {}) {
            const commodity = String(data.commodity || "").toLowerCase();
            const required = [];
            if (["luce", "dual"].includes(commodity) || hasValue(data.consumo_luce_kwh)) {
                required.push(["consumo_luce_kwh", "consumo luce"], ["prezzo_luce_eur_kwh", "prezzo luce"], ["quota_fissa_vendita_luce_eur_anno", "quota fissa luce"]);
            }
            if (["gas", "dual"].includes(commodity) || hasValue(data.consumo_gas_smc)) {
                required.push(["consumo_gas_smc", "consumo gas"], ["prezzo_gas_eur_smc", "prezzo gas"], ["quota_fissa_vendita_gas_eur_anno", "quota fissa gas"]);
            }
            return required.filter(([key]) => !hasValue(data[key])).map(([, label]) => label);
        }

        function renderPdfDetails(lead) {
            const documents = Array.isArray(lead.pdfDocuments) ? lead.pdfDocuments : [];
            if (!documents.length) return `<span class="muted">Nessun PDF associato</span>`;
            const merged = lead.pdfData || {};
            const docs = documents.map((doc, index) => {
                const missing = missingPdfFields(doc);
                return `
                    <div class="pdf-document">
                        <strong>Documento ${index + 1}: ${escapeHtml(doc.filename || "senza nome")}</strong>
                        ${doc.error ? `<div class="missing">${escapeHtml(doc.error)}</div>` : renderPdfFields(doc)}
                        ${missing.length ? `<div class="missing">Non letti: ${escapeHtml(missing.join(", "))}</div>` : ""}
                    </div>
                `;
            }).join("");
            return `
                <details>
                    <summary>Dati bolletta (${documents.length})</summary>
                    <div class="pdf-details">
                        <strong>Dati finali usati dal modulo</strong>
                        ${renderPdfFields(merged)}
                        ${docs}
                        <button type="button" class="button copy-pdf" data-copy-id="${escapeHtml(lead.id)}" style="margin-top:10px; padding:7px 10px; font-size:12px;">Copia dati tecnici</button>
                    </div>
                </details>
            `;
        }

        function monetizationLabel(monetization = {}) {
            const status = String(monetization.status || "");
            if (["commission_approved", "commission_confirmed", "paid", "pagato"].includes(status.toLowerCase())) {
                return `<span class="badge ok">Entrata confermata</span><br>${escapeHtml(euro(monetization.expectedCommission))}`;
            }
            if (status === "ready_to_redirect") {
                return `<span class="badge warn">Click verso il fornitore</span><div class="muted economic-note">Attivazione e commissione non ancora confermate.</div>`;
            }
            if (status === "partner_request_recorded") {
                return `<span class="badge warn">Richiesta registrata</span><div class="muted economic-note">Non e una vendita confermata.</div>`;
            }
            return `<span class="muted">Nessuna entrata confermata</span>`;
        }

        function renderRows(leads = []) {
            if (!leads.length) {
                rowsBox.innerHTML = `<tr><td colspan="11" class="muted">Nessun lead trovato.</td></tr>`;
                return;
            }
            rowsBox.innerHTML = leads.map((lead) => {
                const offer = lead.selectedOffer || {};
                const monetization = lead.monetization || {};
                const consents = lead.consents || {};
                const current = lead.currentSupply || {};
                const profile = lead.comparisonProfile || {};
                const consentClass = consents.partners ? "ok" : "warn";
                return `
                    <tr>
                        <td>${escapeHtml(formatDate(lead.createdAt))}<br><span class="muted">${escapeHtml(lead.id)}</span></td>
                        <td><span class="badge">${escapeHtml(lead.status || "")}</span><br>${escapeHtml(lead.customerType || "")}</td>
                        <td>${escapeHtml(lead.name || "")}</td>
                        <td>${escapeHtml(lead.phone || "")}<br><span class="muted">${escapeHtml(lead.email || "")}</span></td>
                        <td>${escapeHtml(lead.source || "")}</td>
                        <td>
                            <strong>${escapeHtml(lead.dataOrigin || "")}</strong>
                            <br><span class="muted">PDF: ${escapeHtml(lead.pdfDocumentCount ?? 0)}</span>
                            <br><span class="muted">${escapeHtml(current.provider || "")} ${escapeHtml(current.luceConsumoKwh || "")} kWh ${escapeHtml(current.gasConsumoSmc || "")} Smc</span>
                            <br><span class="muted">${escapeHtml(profile.tipoPrezzo || "")} ${escapeHtml(profile.tipoFornitura || "")}</span>
                            ${renderPdfDetails(lead)}
                        </td>
                        <td>${escapeHtml(euro(lead.bestSaving))}</td>
                        <td>${escapeHtml(offer.provider || "")}<br><strong>${escapeHtml(offer.name || "")}</strong><br><span class="muted">${escapeHtml(offer.destinationStatus || "")}</span></td>
                        <td><span class="badge ${consentClass}">servizio ${consents.service ? "si" : "no"}</span><br><span class="badge ${consentClass}">partner ${consents.partners ? "si" : "no"}</span></td>
                        <td>${monetizationLabel(monetization)}${hasValue(monetization.expectedCommission) ? `<br><span class="muted">Potenziale: ${escapeHtml(euro(monetization.expectedCommission))}</span>` : ""}</td>
                        <td><button type="button" class="subtle-danger delete-lead" data-lead-id="${escapeHtml(lead.id)}">Elimina</button></td>
                    </tr>
                `;
            }).join("");
        }

        async function loadLeads() {
            const token = tokenInput.value.trim();
            const limit = limitInput.value || "50";
            if (!token) {
                setStatus("Token mancante.", true);
                return;
            }
            setStatus("Caricamento lead...");
            try {
                const response = await fetch(`/api/staff-leads?limit=${encodeURIComponent(limit)}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await response.json();
                if (!response.ok || !data.ok) throw new Error(data.error || data.status || "Errore caricamento");
                renderMetrics(data.summary);
                currentLeads = data.leads || [];
                renderRows(data.leads);
                setStatus(`Aggiornato: ${formatDate(data.checkedAt)}. Database: ${data.status}.`);
            } catch (error) {
                renderMetrics({});
                currentLeads = [];
                renderRows([]);
                setStatus(error.message || "Errore caricamento", true);
            }
        }

        async function deleteRequest(url, confirmation) {
            const token = tokenInput.value.trim();
            if (!token) throw new Error("Token staff mancante.");
            const response = await fetch(url, {
                method: "DELETE",
                headers: {
                    Authorization: `Bearer ${token}`,
                    "X-Staff-Confirmation": confirmation,
                },
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || data.status || "Eliminazione non riuscita");
            return data;
        }

        async function deleteLead(id) {
            const lead = currentLeads.find((item) => item.id === id);
            const label = lead?.name || id;
            if (!window.confirm(`Eliminare definitivamente il contatto ${label}? L'operazione non si puo annullare.`)) return;
            setStatus("Eliminazione contatto...");
            try {
                await deleteRequest(`/api/staff-leads?id=${encodeURIComponent(id)}`, "ELIMINA_LEAD");
                await loadLeads();
                setStatus(`Contatto ${label} eliminato.`);
            } catch (error) {
                setStatus(error.message || "Eliminazione non riuscita", true);
            }
        }

        async function resetLeads() {
            const confirmation = window.prompt("Questa operazione elimina tutti i contatti e i relativi eventi collegati. Gli analytics anonimi restano. Scrivi AZZERA per continuare.");
            if (confirmation !== "AZZERA") {
                if (confirmation !== null) setStatus("Azzeramento annullato: conferma non corretta.", true);
                return;
            }
            setStatus("Azzeramento archivio lead...");
            resetButton.disabled = true;
            try {
                const data = await deleteRequest("/api/staff-leads?scope=all", "AZZERA_LEAD");
                await loadLeads();
                setStatus(`Archivio lead azzerato. Contatti rimossi: ${data.deletedCount || 0}.`);
            } catch (error) {
                setStatus(error.message || "Azzeramento non riuscito", true);
            } finally {
                resetButton.disabled = false;
            }
        }

        async function copyPdfData(id) {
            const lead = currentLeads.find((item) => item.id === id);
            if (!lead) return;
            const content = JSON.stringify({ pdfData: lead.pdfData || {}, pdfDocuments: lead.pdfDocuments || [] }, null, 2);
            try {
                await navigator.clipboard.writeText(content);
                setStatus("Dati tecnici PDF copiati.");
            } catch {
                setStatus("Copia non riuscita: apri il dettaglio e seleziona i dati manualmente.", true);
            }
        }

        async function downloadCsv() {
            const token = tokenInput.value.trim();
            const limit = limitInput.value || "50";
            if (!token) {
                setStatus("Token mancante.", true);
                return;
            }
            setStatus("Preparazione CSV...");
            try {
                const response = await fetch(`/api/staff-leads?limit=${encodeURIComponent(limit)}&format=csv`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!response.ok) throw new Error("Errore download CSV");
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `offertalogica-leads-${new Date().toISOString().slice(0, 10)}.csv`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
                setStatus("CSV generato.");
            } catch (error) {
                setStatus(error.message || "Errore download CSV", true);
            }
        }

        csvButton.addEventListener("click", downloadCsv);
        resetButton.addEventListener("click", resetLeads);
        rowsBox.addEventListener("click", (event) => {
            const deleteButton = event.target.closest(".delete-lead");
            if (deleteButton) deleteLead(deleteButton.dataset.leadId || "");
            const copyButton = event.target.closest(".copy-pdf");
            if (copyButton) copyPdfData(copyButton.dataset.copyId || "");
        });

        const initialToken = tokenFromHash();
        if (initialToken) {
            tokenInput.value = initialToken;
            history.replaceState(null, "", location.pathname);
            loadLeads();
        }
    </script>
</body>
</html>
