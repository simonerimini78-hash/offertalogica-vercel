name: Aggiorna offerte ARERA

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * *"

permissions:
  contents: write

jobs:
  update-arera-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Genera JSON offerte ARERA
        run: python scripts/update-arera-menu.py

      - name: Commit aggiornamento se necessario
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/offerte-arera-menu.json public/data/offerte-arera-menu.json
          if ! git diff --cached --quiet; then
            git commit -m "Aggiorna offerte ARERA"
            git push
          fi
